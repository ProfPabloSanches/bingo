<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador Cartesiano Pro</title>
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #6366f1;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            padding: 40px;
            margin: 0;
        }

        .main-card {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 350px;
        }

        .sidebar {
            background: white;
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 220px;
            max-height: 85vh;
            overflow-y: auto;
        }

        h2, h3 { margin-top: 0; color: var(--primary); font-size: 1.4rem; }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        label { font-size: 0.8rem; font-weight: 600; color: #64748b; }
        
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--primary); outline: none; }

        .info-box {
            background: #eff6ff;
            border: 1px solid #dbeafe;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #1e40af;
        }

        button, .btn-secondary {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
            text-align: center;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
            font-size: 0.9rem;
        }

        button:hover, .btn-secondary:hover { opacity: 0.9; }

        .btn-home {
            background-color: #64748b;
            margin-top: 15px;
        }

        #resultado-atual {
            margin: 20px 0;
            padding: 20px;
            background: #f1f5f9;
            border-radius: 12px;
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            color: var(--primary);
        }

        .coord-item {
            padding: 8px;
            border-bottom: 1px solid #f1f5f9;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
        }

        .badge {
            background: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

<div class="main-card">
    <h2>Configurações</h2>
    
    <div class="info-box">
        Total de combinações possíveis: <strong id="total-possibilidades">0</strong><br>
        <span style="font-size: 0.75rem; opacity: 0.8;">(Este é o número máximo de sorteios)</span>
    </div>

    <label>Eixo X (Mín / Máx)</label>
    <div class="grid-inputs">
        <input type="number" id="minX" value="-5" oninput="atualizarPossibilidades()">
        <input type="number" id="maxX" value="5" oninput="atualizarPossibilidades()">
    </div>

    <label>Eixo Y (Mín / Máx)</label>
    <div class="grid-inputs">
        <input type="number" id="minY" value="-5" oninput="atualizarPossibilidades()">
        <input type="number" id="maxY" value="5" oninput="atualizarPossibilidades()">
    </div>

    <button onclick="sortear()">Sortear Novo Ponto</button>
    <button onclick="limpar()" style="background: #ef4444; margin-top: 8px;">Limpar Histórico</button>

    <div id="resultado-atual">-- , --</div>
    <div style="text-align: center; font-size: 0.8rem; color: #94a3b8;">
        Sorteados: <span id="cont-sorteados">0</span>
    </div>

    <a href="index.html" class="btn-secondary btn-home">🏠 Voltar à Página Inicial</a>
</div>

<div class="sidebar">
    <h3>Histórico</h3>
    <div id="historico"></div>
</div>

<script>
    let coordenadasSorteadas = new Set();

    function atualizarPossibilidades() {
        const minX = parseInt(document.getElementById('minX').value) || 0;
        const maxX = parseInt(document.getElementById('maxX').value) || 0;
        const minY = parseInt(document.getElementById('minY').value) || 0;
        const maxY = parseInt(document.getElementById('maxY').value) || 0;

        if (maxX >= minX && maxY >= minY) {
            // O cálculo é (Max - Min + 1) pois o limite é inclusivo
            const totalX = maxX - minX + 1;
            const totalY = maxY - minY + 1;
            const total = totalX * totalY;
            document.getElementById('total-possibilidades').innerText = total.toLocaleString();
            return total;
        } else {
            document.getElementById('total-possibilidades').innerText = "0 (Erro nos limites)";
            return 0;
        }
    }

    function sortear() {
        const minX = parseInt(document.getElementById('minX').value);
        const maxX = parseInt(document.getElementById('maxX').value);
        const minY = parseInt(document.getElementById('minY').value);
        const maxY = parseInt(document.getElementById('maxY').value);

        const totalPossivel = atualizarPossibilidades();

        if (totalPossivel === 0) {
            alert("Verifique os limites fornecidos. O valor Máximo deve ser maior ou igual ao Mínimo.");
            return;
        }

        if (coordenadasSorteadas.size >= totalPossivel) {
            alert(`Limite atingido! Todas as ${totalPossivel} coordenadas possíveis neste intervalo já foram sorteadas.`);
            return;
        }

        let x, y, chave;
        do {
            x = Math.floor(Math.random() * (maxX - minX + 1)) + minX;
            y = Math.floor(Math.random() * (maxY - minY + 1)) + minY;
            chave = `${x},${y}`;
        } while (coordenadasSorteadas.has(chave));

        coordenadasSorteadas.add(chave);
        
        document.getElementById('resultado-atual').innerText = `(${x}, ${y})`;
        document.getElementById('cont-sorteados').innerText = coordenadasSorteadas.size;
        
        const item = document.createElement('div');
        item.className = 'coord-item';
        item.innerHTML = `<span>(${x}, ${y})</span> <span class="badge">#${coordenadasSorteadas.size}</span>`;
        document.getElementById('historico').prepend(item);
    }

    function limpar() {
        if(confirm("Deseja realmente limpar todo o histórico?")) {
            coordenadasSorteadas.clear();
            document.getElementById('historico').innerHTML = '';
            document.getElementById('resultado-atual').innerText = '-- , --';
            document.getElementById('cont-sorteados').innerText = '0';
        }
    }

    atualizarPossibilidades();
</script>

</body>
</html>
