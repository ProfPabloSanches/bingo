<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Cartelas: Bingo de Raízes</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f1f5f9;
            --text: #1e293b;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        
        .setup-container { 
            background: #fff; padding: 25px; border-radius: 12px; 
            max-width: 800px; margin: 0 auto 30px auto; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-top: 5px solid var(--primary);
        }

        .config-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; align-items: flex-end; }
        
        .input-group { display: flex; flex-direction: column; align-items: center; }
        .input-group label { font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #64748b; text-transform: uppercase; }
        
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; text-align: center; font-size: 14px; }
        .num-input { width: 80px; font-weight: bold; }

        .checkbox-group { display: flex; align-items: center; gap: 8px; font-weight: bold; color: var(--primary); cursor: pointer; }

        .btn-row { display: flex; justify-content: center; gap: 10px; }
        .btn { padding: 12px 24px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .btn-gen { background: var(--primary); color: white; }
        .btn-print { background: #22c55e; color: white; }
        .btn-home { background: #64748b; color: white; }

        /* Estilo da Cartela (A4) */
        .page { 
            width: 210mm; 
            min-height: 297mm; 
            padding: 10mm; 
            margin: 0 auto 30px auto; 
            background: white; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 cartelas por página */
            gap: 15mm;
            box-sizing: border-box;
        }

        .cartela {
            border: 2px solid #334155;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: fit-content;
        }

        .cartela-header {
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
            text-transform: uppercase;
            border-bottom: 2px solid #334155;
            padding-bottom: 5px;
        }

        .grid-bingo {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3x3 para bingo rápido */
            gap: 5px;
        }

        .cell {
            aspect-ratio: 1;
            border: 1px solid #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            background: #fff;
        }

        @media print {
            .setup-container, h1 { display: none !important; }
            body { background: white; padding: 0; }
            .page { margin: 0; box-shadow: none; border: none; }
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: var(--primary);">Gerador de Cartelas de Raízes</h1>

    <div class="setup-container">
        <div class="config-row">
            <div class="input-group">
                <label>Qtd. de Cartelas</label>
                <input type="number" id="qtdCartelas" value="4" min="1" class="num-input">
            </div>
            
            <div class="input-group">
                <label>Intervalo Radicando</label>
                <div style="display:flex; gap:5px">
                    <input type="number" id="minVal" value="1" class="num-input">
                    <input type="number" id="maxVal" value="100" class="num-input">
                </div>
            </div>

            <div class="input-group">
                <label class="checkbox-group">
                    <input type="checkbox" id="apenasExatas" checked>
                    Apenas Raízes Exatas
                </label>
            </div>
        </div>

        <div class="btn-row">
            <a href="index.html" class="btn btn-home">🏠 Início</a>
            <button class="btn btn-gen" onclick="gerarCartelas()">🎲 Gerar Cartelas</button>
            <button class="btn btn-print" onclick="window.print()">🖨️ Imprimir</button>
        </div>
    </div>

    <div id="print-area"></div>

    <script>
        function gerarCartelas() {
            const qtd = parseInt(document.getElementById('qtdCartelas').value);
            const min = parseInt(document.getElementById('minVal').value);
            const max = parseInt(document.getElementById('maxVal').value);
            const apenasExatas = document.getElementById('apenasExatas').checked;
            const container = document.getElementById('print-area');
            
            container.innerHTML = '';

            // 1. Gerar pool de números possíveis
            let pool = [];
            for (let i = min; i <= max; i++) {
                if (apenasExatas) {
                    if (Math.sqrt(i) % 1 === 0) pool.push(i);
                } else {
                    pool.push(i);
                }
            }

            if (pool.length < 9) {
                alert(`Erro: O intervalo possui apenas ${pool.length} opções, mas são necessários no mínimo 9 para a cartela.`);
                return;
            }

            // 2. Criar as páginas e cartelas
            let currentPage;
            for (let c = 0; c < qtd; c++) {
                // Cria nova página A4 a cada 4 cartelas (2x2) ou 2 cartelas (dependendo do ajuste)
                if (c % 4 === 0) {
                    currentPage = document.createElement('div');
                    currentPage.className = 'page';
                    container.appendChild(currentPage);
                }

                const cartela = document.createElement('div');
                cartela.className = 'cartela';
                
                const header = document.createElement('div');
                header.className = 'cartela-header';
                header.innerText = `BINGO DE RAÍZES #${c + 1}`;
                
                const grid = document.createElement('div');
                grid.className = 'grid-bingo';

                // Sortear 9 números únicos para esta cartela
                let sorteadosCartela = [...pool].sort(() => 0.5 - Math.random()).slice(0, 9);
                sorteadosCartela.sort((a, b) => a - b); // Ordenar para facilitar ao aluno

                sorteadosCartela.forEach(num => {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.innerText = `√${num}`;
                    grid.appendChild(cell);
                });

                cartela.appendChild(header);
                cartela.appendChild(grid);
                currentPage.appendChild(cartela);
            }
        }
    </script>
</body>
</html>
